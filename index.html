<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player - Internal Communication Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        }
        .player-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }
        /* Custom Audio Player Styling for a cleaner look */
        audio {
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
            width: 100%;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-xl">
        <!-- Main Player Card -->
        <div class="player-card rounded-2xl overflow-hidden">
            <!-- Header/Title Area -->
            <div class="px-6 py-4 border-b border-[#30363d] flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="bg-blue-500/10 p-2 rounded-lg">
                        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-sm font-semibold text-white truncate max-w-[250px] md:max-w-xs">
                            David and Debra Communication
                        </h1>
                        <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Internal Archive • MP3</p>
                    </div>
                </div>
                <div class="hidden sm:block">
                     <span class="text-xs text-gray-400 bg-[#21262d] px-2 py-1 rounded border border-[#30363d]">300 KB</span>
                </div>
            </div>

            <!-- Visual Content Area -->
            <div class="p-8 md:p-12 flex flex-col items-center justify-center bg-[#010409]">
                <!-- Animated Waveform Visualizer -->
                <div class="flex items-center justify-center space-x-1.5 w-full h-32 mb-10">
                    <div class="w-2 bg-blue-500 opacity-20 h-10 rounded-full"></div>
                    <div class="w-2 bg-blue-500 opacity-40 h-20 rounded-full animate-[pulse_1.5s_infinite]"></div>
                    <div class="w-2 bg-blue-500 opacity-60 h-28 rounded-full"></div>
                    <div class="w-2 bg-blue-500 opacity-80 h-32 rounded-full animate-[pulse_1s_infinite]"></div>
                    <div class="w-2 bg-blue-500 h-24 rounded-full"></div>
                    <div class="w-2 bg-blue-500 opacity-80 h-32 rounded-full animate-[pulse_1.2s_infinite]"></div>
                    <div class="w-2 bg-blue-500 opacity-60 h-28 rounded-full"></div>
                    <div class="w-2 bg-blue-500 opacity-40 h-20 rounded-full animate-[pulse_1.5s_infinite]"></div>
                    <div class="w-2 bg-blue-500 opacity-20 h-10 rounded-full"></div>
                </div>
                
                <!-- Audio Controls -->
                <div class="w-full bg-[#161b22] p-4 rounded-xl border border-[#30363d]">
                    <audio controls class="w-full">
                        <source src="David and Debra Communication.mp3" type="audio/mpeg">
                        Your browser does not support the audio element.
                    </audio>
                </div>
                
                <p class="mt-8 text-xs text-gray-500 italic text-center leading-relaxed">
                    Recording of the Q3 project revision dispute between management and analyst team.
                </p>
            </div>
            
            <!-- Footer Action Area -->
            <div class="px-6 py-4 bg-[#161b22] border-t border-[#30363d] flex items-center justify-center">
                <button class="text-xs text-gray-400 hover:text-white transition-colors flex items-center space-x-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    <span>Download Transcript</span>
                </button>
            </div>
        </div>

        <!-- Meta Info outside the card -->
        <div class="mt-6 flex flex-col items-center text-center">
            <p class="text-xs text-gray-600">Confidential Archive: pavisichn-cell Internal</p>
        </div>
    </div>

</body>
</html>
